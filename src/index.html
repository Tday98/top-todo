<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Application</title>
</head>
<body>
    <div class="sidebar">
        <h2>Projects</h2>
        <div id="project-list">

        </div>
        <button id="add-project-btn">+ New Project</button>
    </div>

    <div id="project-form" style="display: none;">
        <input type="text" id="project-name" placeholder="Project name">
        <input type="text" id="project-description" placeholder="Description">
        <button id="submit-project">Create</button>
        <button id="cancel-project">Cancel</button>
    </div>

    <div class="main">
        <h2 id="active-project-name">General</h2>
        <div id="todo-list">

        </div>
        <button id="add-todo-btn">+ New Todo</button>
    </div>

    <div id="todo-form" style="display: none;">
        <input type="text" id="todo-title" placeholder="Title">
        <input type="text" id="todo-description" placeholder="Description">
        <input type="date" id="todo-duedate" placeholder="Due Date">
        <select id="todo-priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>
        <button id="submit-todo">Create Todo</button>
        <button id="cancel-todo">Cancel</button>
    </div>
</body>
</html>
